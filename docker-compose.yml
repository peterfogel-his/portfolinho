services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolinho
      POSTGRES_USER: portfolinho
      POSTGRES_PASSWORD: portfolinho
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolinho"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Valfritt: lokal S3-kompatibel fillagring
  # Aktivera med: docker-compose --profile storage up
  minio:
    image: minio/minio:latest
    profiles: ["storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: portfolinho
      MINIO_ROOT_PASSWORD: portfolinho123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
