services:

  # ── Databas ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolinho
      POSTGRES_USER: portfolinho
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolinho}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolinho"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portfolinho-net

  # ── Fillagring (S3-kompatibel) ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-portfolinho}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-portfolinho123}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolinho-net

  # ── Databasmigration (körs en gång, avslutar sedan) ───────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: deps
    command: pnpm db:migrate
    environment:
      DATABASE_URL: postgresql://portfolinho:${DB_PASSWORD:-portfolinho}@postgres:5432/portfolinho
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolinho-net

  # ── API-server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://portfolinho:${DB_PASSWORD:-portfolinho}@postgres:5432/portfolinho
      PORT: 3001
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Sätt BETTER_AUTH_SECRET i .env}
      LTI_KEY_ID: ${LTI_KEY_ID:-}
      LTI_PRIVATE_KEY: ${LTI_PRIVATE_KEY:-}
      CANVAS_ISSUER: ${CANVAS_ISSUER:-}
      CANVAS_CLIENT_ID: ${CANVAS_CLIENT_ID:-}
      CANVAS_CLIENT_SECRET: ${CANVAS_CLIENT_SECRET:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-portfolinho}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-portfolinho123}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolinho-net

  # ── Webbfront (nginx + React-build) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - portfolinho-net

networks:
  portfolinho-net:
    driver: bridge

volumes:
  pgdata:
  miniodata:
